<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>THE CHRONOS-LENS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0E0B;--panel:#10140F;--panel2:#151A13;--line:#2A3326;--phos:#9DB89A;--phos-dim:#5A6B52;--phos-faint:#39452F;--ai:#D9C98A;--ai-dim:#8A7F58;--neon:#71E8C9;--bright:#E8EBD9;--interest:#E0A85C;--warn:#D98A6A;--discover:#C9A6E8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--phos);font-family:'IBM Plex Mono',monospace;font-size:14px;line-height:1.45;display:flex;justify-content:center}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:60;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.13) 0,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 3px)}
#app{width:100%;max-width:560px;height:100vh;height:100dvh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
header{border-bottom:1px solid var(--line);padding:6px 12px}
.toprow{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.wordmark{font-family:'VT323',monospace;font-size:21px;letter-spacing:2px;color:var(--bright)}
.wordmark span{color:var(--neon)}
.hud{display:flex;gap:10px;font-size:11px;color:var(--phos-dim)}
.hud b{color:var(--phos);font-weight:500}
.bars{display:flex;gap:10px;margin-top:5px}
.bb{flex:1}
.bl{display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:var(--phos-dim);margin-bottom:2px}
.bl .reg{color:var(--ai-dim)}
.track{height:4px;background:var(--panel2);overflow:hidden}
.fill{height:100%;width:0%;transition:width .5s steps(10)}
#xpfill{background:var(--phos-dim)}#xpfill.up{background:var(--neon)}
#attfill{background:var(--ai-dim)}#attfill.up{background:var(--ai)}
/* tabs */
#tabs{display:flex;border-bottom:1px solid var(--line);background:var(--panel)}
.tab{flex:1;text-align:center;font-size:11px;letter-spacing:2px;padding:9px 0;color:var(--phos-dim);border:none;background:none;min-height:0;cursor:pointer}
.tab.active{color:var(--neon);border-bottom:2px solid var(--neon)}
.tab .dot{color:var(--interest)}
/* views */
.view{display:none;flex:1;min-height:0;flex-direction:column}
.view.active{display:flex}
/* FIELD */
#mapstage{position:relative;flex:1;min-height:0;background:#070907;overflow:hidden}
#mapcanvas{width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none}
.zoombtns{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px}
.zoombtns button{width:34px;height:34px;min-height:0;padding:0;font-size:17px;background:rgba(16,20,15,0.85)}
.maplegend{position:absolute;bottom:6px;left:10px;right:10px;display:flex;justify-content:space-between;font-size:9px;letter-spacing:1px;color:var(--phos-dim);text-shadow:0 0 4px #000;pointer-events:none}
.scalebar{display:flex;align-items:center;gap:5px}
.scaleline{height:5px;border-left:1px solid var(--phos-dim);border-right:1px solid var(--phos-dim);border-bottom:1px solid var(--phos-dim);width:52px}
#fieldinfo{position:absolute;top:8px;left:10px;font-size:9px;letter-spacing:1.5px;color:var(--phos-dim);text-shadow:0 0 4px #000;pointer-events:none}
#fieldinfo b{color:var(--phos);font-weight:500}
/* LENS */
#lensstage{position:relative;flex:1;min-height:0;background:#060806;overflow:hidden}
#feed{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;display:block}
video{display:none}
.hudline{position:absolute;font-size:9px;letter-spacing:1.5px;color:var(--phos-dim);text-shadow:0 0 4px #000}
#hud-tl{top:8px;left:10px}
#hud-tr{top:8px;right:10px;text-align:right}
#densitywrap{position:absolute;top:24px;left:10px;width:80px;height:4px;background:rgba(21,26,19,0.8)}
#densityfill{height:100%;width:0%;background:var(--neon);transition:width .3s}
#reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;pointer-events:none}
#reticle .c{position:absolute;width:16px;height:16px;border:1px solid var(--phos);opacity:.8}
#reticle .c1{top:0;left:0;border-right:none;border-bottom:none}
#reticle .c2{top:0;right:0;border-left:none;border-bottom:none}
#reticle .c3{bottom:0;left:0;border-right:none;border-top:none}
#reticle .c4{bottom:0;right:0;border-left:none;border-top:none}
#reticle.locked .c{border-color:var(--neon)}
#ringwrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#ring{transform:rotate(-90deg)}
#ring circle{fill:none;stroke-width:2}
#ring .bg{stroke:rgba(157,184,154,0.15)}
#ring .fg{stroke:var(--neon);stroke-dasharray:283;stroke-dashoffset:283}
#scanmsg{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:2px;color:var(--neon);text-shadow:0 0 6px #000}
#resolve{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;background:linear-gradient(transparent 22%,rgba(11,14,11,0.95) 55%)}
#resolve.open{display:flex}
.rc{padding:10px 14px 12px}
.rc .still{position:absolute;top:10px;left:50%;transform:translateX(-50%);border:1px solid var(--line)}
.rc .still canvas{display:block;image-rendering:pixelated;width:150px;height:112px}
.propline{font-size:10.5px;letter-spacing:1px;color:var(--phos-dim);margin:3px 0 5px}
.propline b{color:var(--phos);font-weight:500}
.propline .tr{color:var(--interest)}
.chiprow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:var(--panel2);color:var(--phos-dim);border:1px solid var(--line);padding:8px 9px;cursor:pointer;min-height:0;letter-spacing:.5px}
.chip.proposed{border-color:rgba(113,232,201,.5);color:var(--neon)}
.chip.selected{background:var(--phos-faint);border-color:var(--phos);color:var(--bright)}
.confirmrow{display:flex;gap:7px}
.confirmrow button{flex:1}
/* RELIQUARY */
#reliqview{overflow-y:auto;padding:10px 12px}
.regionbar{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.regionname{font-family:'VT323',monospace;font-size:18px;letter-spacing:2px}
.completion{font-size:10px;color:var(--phos-dim)}
.completion b{color:var(--neon);font-weight:500}
.comptrack{height:4px;background:var(--panel2);margin:5px 0 12px}
.compfill{height:100%;width:0%;background:var(--phos-dim);transition:width .4s}
.seclabel{font-size:9px;letter-spacing:2.5px;color:var(--phos-dim);margin:12px 0 7px}
#slotgrid,#emgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px}
.slot{border:1px solid var(--line);background:var(--panel);padding:7px;min-height:118px;display:flex;flex-direction:column;gap:3px;position:relative}
.slot .thumb{width:100%;aspect-ratio:4/3;background:var(--panel2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.slot .thumb img{width:100%;image-rendering:pixelated}
.slot .thumb .q{font-family:'VT323',monospace;font-size:19px;color:var(--phos-faint)}
.slot .tname{font-size:8.5px;letter-spacing:1px;color:var(--phos-dim)}
.slot .pub{font-size:8px;color:var(--phos-faint);margin-top:auto}
.slot.lit{border-color:rgba(113,232,201,.35)}
.slot.lit .tname{color:var(--neon)}
.slot .stack{position:absolute;top:4px;right:6px;font-size:8.5px;color:var(--phos-dim);text-shadow:0 0 3px #000}
.slot .taught{font-size:7.5px;color:var(--interest);letter-spacing:.5px}
.slot.emergent{border-color:rgba(224,168,92,.45);border-style:dashed}
.slot.emergent .tname{color:var(--interest)}
/* log + transmit */
#log{max-height:132px;min-height:64px;overflow-y:auto;border-top:1px solid var(--line);padding:7px 12px;display:flex;flex-direction:column;gap:6px;background:var(--panel)}
.entry{white-space:pre-wrap;word-wrap:break-word}
.sys{color:var(--phos-dim);font-size:11px}.sys::before{content:"▸ "}
.disc{color:var(--discover);font-size:11px}.disc::before{content:"◇ "}
.flavor{color:var(--phos);font-size:12.5px}
.player{color:var(--bright);font-size:11.5px}.player::before{content:"YOU › ";color:var(--phos-dim)}
.ai{color:var(--ai);border-left:2px solid var(--ai-dim);padding:5px 10px;background:rgba(217,201,138,.045);font-size:12.5px}
.ai::before{content:"LENS";display:block;font-size:8px;letter-spacing:3px;color:var(--ai-dim);margin-bottom:2px}
.ai.named::before{content:attr(data-name)}
.ai.somber{border-left-color:#7a6f9a}.ai.warm{border-left-color:var(--neon)}
.ai.query{border-left-color:var(--interest);background:rgba(224,168,92,.05)}
.warnai{color:var(--warn)!important;border-left-color:var(--warn)!important}
.milestone{color:var(--bright);text-align:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 0;font-family:'VT323',monospace;font-size:18px;letter-spacing:3px}
.echo{color:var(--neon);font-style:italic;font-size:11.5px;border-left:2px solid rgba(113,232,201,.3);padding:4px 10px}
.echo::before{content:"NETWORK ECHO";display:block;font-size:8px;letter-spacing:3px;font-style:normal;color:rgba(113,232,201,.5);margin-bottom:2px}
#controls{border-top:1px solid var(--line);padding:8px 12px 10px;background:var(--panel)}
.ctl-row{display:flex;gap:6px;margin-bottom:6px}
.ctl-row:last-child{margin-bottom:0}
button{font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:var(--panel2);color:var(--phos);border:1px solid var(--line);padding:9px 11px;cursor:pointer;min-height:44px;flex:1}
button:active{background:var(--phos-faint)}
button:disabled{opacity:.35}
button.scan{border-color:rgba(113,232,201,.4);color:var(--neon);letter-spacing:2px;user-select:none;touch-action:none}
button.primary{border-color:var(--phos-dim);color:var(--bright)}
.iconbtn{flex:0 0 auto;min-height:0;padding:5px 9px;font-size:10px}
#say{flex:1;min-height:44px;font-family:'IBM Plex Mono',monospace;font-size:16px;background:var(--bg);color:var(--bright);border:1px solid var(--line);padding:9px 11px;outline:none;border-radius:0;-webkit-appearance:none}
#say:focus{border-color:var(--ai-dim)}
#say.await{border-color:var(--interest)}
#say::placeholder{color:var(--phos-faint);font-size:12px}
#sendbtn{flex:0 0 auto}
#nameceremony{display:none;text-align:center;padding:12px 0}
#nameceremony input{font-family:'VT323',monospace;font-size:22px;text-align:center;background:var(--bg);color:var(--neon);border:none;border-bottom:1px solid var(--ai-dim);padding:7px;width:220px;outline:none;letter-spacing:2px;border-radius:0}
#nameceremony button{margin-top:12px;max-width:220px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--line)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="toprow">
      <div class="wordmark">CHRONOS<span>-</span>LENS</div>
      <div class="hud"><span>LVL <b id="lvl">1</b></span><span>XP <b id="xp">0</b></span><span>FRAG <b id="frag">0</b></span></div>
    </div>
    <div class="bars">
      <div class="bb"><div class="bl"><span>PROGRESS</span><span id="xpnum">0/25</span></div><div class="track"><div id="xpfill" class="fill"></div></div></div>
      <div class="bb"><div class="bl"><span>ATTUNEMENT</span><span class="reg" id="regname">INSTRUMENT</span></div><div class="track"><div id="attfill" class="fill"></div></div></div>
    </div>
  </header>

  <div id="tabs">
    <button class="tab active" data-v="field" onclick="showView('field')">FIELD</button>
    <button class="tab" data-v="lens" onclick="showView('lens')">LENS</button>
    <button class="tab" data-v="reliq" onclick="showView('reliq')">RELIQUARY</button>
  </div>

  <!-- FIELD -->
  <div class="view active" id="v-field">
    <div id="mapstage">
      <canvas id="mapcanvas" width="240" height="200"></canvas>
      <div id="fieldinfo">POSITION · <b id="here">UNTRACKED</b> · <span id="heatlabel"></span></div>
      <div class="zoombtns"><button onclick="zoomBy(1)">+</button><button onclick="zoomBy(-1)">−</button></div>
      <div class="maplegend"><span id="coordlabel">0,0</span><span class="scalebar"><span class="scaleline" id="scaleline"></span><span id="scalemeters">100 m</span></span></div>
    </div>
  </div>

  <!-- LENS -->
  <div class="view" id="v-lens">
    <div id="lensstage">
      <video id="cam" autoplay playsinline muted></video>
      <canvas id="feed" width="128" height="96"></canvas>
      <div class="hudline" id="hud-tl">TEMPORAL DENSITY</div>
      <div id="densitywrap"><div id="densityfill"></div></div>
      <div class="hudline" id="hud-tr">SCALE READ: —</div>
      <div id="reticle"><div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div></div>
      <div id="ringwrap"><svg id="ring" width="90" height="90" viewBox="0 0 96 96"><circle class="bg" cx="48" cy="48" r="45"/><circle class="fg" cx="48" cy="48" r="45"/></svg></div>
      <div id="scanmsg"></div>
      <div id="resolve">
        <div class="still"><canvas id="stillcv" width="56" height="42"></canvas></div>
        <div class="rc">
          <div class="propline" id="prop-scale"></div>
          <div class="chiprow" id="scalechips"></div>
          <div class="propline" id="prop-type"></div>
          <div class="chiprow" id="typechips"></div>
          <div class="confirmrow"><button id="confirmbtn" class="primary" onclick="confirmScan()">CONFIRM</button><button onclick="discardScan()">DISCARD</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RELIQUARY -->
  <div class="view" id="v-reliq">
    <div id="reliqview">
      <div class="regionbar"><div class="regionname" id="regionname">SURVEY REGION</div><div class="completion"><b id="litcount">0</b>/<span id="slottotal">8</span> TYPES ATTESTED · <span id="objcount">0</span> HELD</div></div>
      <div class="comptrack"><div class="compfill" id="compfill"></div></div>
      <div class="seclabel">SEEDED TYPES · FROM SURVEY GEOGRAPHY</div>
      <div id="slotgrid"></div>
      <div class="seclabel" id="emlabel" style="display:none">EMERGENT · PENDING CONSENSUS</div>
      <div id="emgrid"></div>
    </div>
  </div>

  <div id="log" aria-live="polite"></div>

  <div id="controls">
    <div id="actionpane">
      <div class="ctl-row">
        <button id="scanbtn" class="scan">HOLD · SCAN</button>
        <button id="btnAsk" onclick="doAsk()">WHAT WAS THIS?</button>
        <button id="btnSync" onclick="doSync()" disabled>SYNC·3</button>
        <button class="iconbtn" id="mutebtn" onclick="toggleMute()">♪</button>
      </div>
      <div class="ctl-row">
        <input id="say" placeholder="transmit to the Lens…" autocomplete="off" spellcheck="false">
        <button id="sendbtn" onclick="transmit()">SEND</button>
      </div>
    </div>
    <div id="nameceremony">
      <div style="font-size:9px;letter-spacing:3px;color:var(--ai-dim);text-align:center">SPEAK A NAME</div>
      <input id="nameinput" maxlength="20" autocomplete="off" spellcheck="false"><br>
      <button class="primary" onclick="giveName()">GIVE NAME</button>
    </div>
  </div>
</div>

<script>
/* ================= AUDIO — analog sovietcore ================= */
const Snd=(()=>{let ctx=null,muted=false,master=null,amb=null,scanNode=null;
function init(){if(ctx)return;try{ctx=new (window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.5;master.connect(ctx.destination);}catch(e){ctx=null}}
function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}
function nbuf(d){const b=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*d),ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=Math.random()*2-1;return b;}
function hiss(dur,vol,f,q,when){if(!ctx||muted)return;const t=ctx.currentTime+(when||0);const n=ctx.createBufferSource();n.buffer=nbuf(dur+0.05);const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f||1200;bp.Q.value=q||0.7;const g=ctx.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.06,t+dur*0.3);g.gain.exponentialRampToValueAtTime(0.0006,t+dur);n.connect(bp);bp.connect(g);g.connect(master);n.start(t);n.stop(t+dur+0.05);}
function click(when,vol){if(!ctx||muted)return;const t=ctx.currentTime+(when||0);const n=ctx.createBufferSource();n.buffer=nbuf(0.02);const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2200;bp.Q.value=2;const g=ctx.createGain();g.gain.setValueAtTime(vol||0.07,t);g.gain.exponentialRampToValueAtTime(0.0004,t+0.02);n.connect(bp);bp.connect(g);g.connect(master);n.start(t);n.stop(t+0.04);}
function tone(f,dur,vol,type,when,glide){if(!ctx||muted)return;const t=ctx.currentTime+(when||0);const o=ctx.createOscillator(),g=ctx.createGain(),lp=ctx.createBiquadFilter();o.type=type||'sine';o.frequency.setValueAtTime(f,t);if(glide)o.frequency.linearRampToValueAtTime(glide,t+dur);lp.type='lowpass';lp.frequency.value=1100;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.1,t+0.04);g.gain.setTargetAtTime(0.0005,t+dur-0.06,0.05);o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.08);}
function startAmbient(){if(!ctx||amb||muted)return;amb=ctx.createGain();amb.gain.value=0;amb.connect(master);const o=ctx.createOscillator(),o2=ctx.createOscillator(),lp=ctx.createBiquadFilter();o.type='sine';o2.type='sine';o.frequency.value=52;o2.frequency.value=78;lp.type='lowpass';lp.frequency.value=200;const f=ctx.createOscillator(),fg=ctx.createGain();f.type='sine';f.frequency.value=0.03;fg.gain.value=60;f.connect(fg);fg.connect(lp.frequency);const n=ctx.createBufferSource();n.buffer=nbuf(4);n.loop=true;const np=ctx.createBiquadFilter();np.type='bandpass';np.frequency.value=1400;np.Q.value=0.4;const ng=ctx.createGain();ng.gain.value=0.35;o.connect(lp);o2.connect(lp);lp.connect(amb);n.connect(np);np.connect(ng);ng.connect(amb);o.start();o2.start();f.start();n.start();amb.gain.linearRampToValueAtTime(0.02,ctx.currentTime+4);}
function scanLoopStart(){if(!ctx||muted||scanNode)return;scanNode=ctx.createGain();scanNode.gain.value=0;scanNode.connect(master);const o=ctx.createOscillator(),lp=ctx.createBiquadFilter();o.type='sine';o.frequency.value=64;lp.type='lowpass';lp.frequency.value=400;o.connect(lp);lp.connect(scanNode);o.start();scanNode._o=o;scanNode._iv=setInterval(()=>{click(0,0.05);if(Math.random()<0.4)click(0.05,0.04);},110);scanNode.gain.linearRampToValueAtTime(0.08,ctx.currentTime+0.15);}
function scanLoopStop(){if(!scanNode)return;clearInterval(scanNode._iv);scanNode.gain.setTargetAtTime(0.0001,ctx.currentTime,0.08);const sn=scanNode;setTimeout(()=>{try{sn._o.stop()}catch(e){}},400);scanNode=null;}
function voice(mood,len){if(!ctx||muted)return;const base=mood==='somber'?150:mood==='warm'?200:mood==='curious'?190:168;const n=Math.max(1,Math.min(3,len||2));click(0,0.06);let when=0.04;for(let i=0;i<n;i++){let f=mood==='curious'?base*(1+0.12*i):mood==='somber'?base*(1-0.08*i):base*(1+(i%2?0.04:0));tone(f,0.16,0.1,'triangle',when,f);when+=0.2;}hiss(when+0.1,mood==='warm'?0.03:0.06,1300,0.7);}
const A={resolve(){resume();click(0,0.07);tone(196,0.4,0.1,'triangle');tone(294,0.4,0.07,'sine',0.08);},file(){resume();click(0,0.06);tone(120,0.4,0.09,'sine',0,150);},discard(){resume();tone(150,0.35,0.08,'sine',0,90);},discover(){resume();click(0,0.07);tone(120,0.5,0.1,'sine',0,150);hiss(0.5,0.05,1600,0.6,0.05);},levelup(){resume();tone(110,1.2,0.1,'sine',0,110);tone(165,1.2,0.08,'sine',0.1);tone(220,1.1,0.06,'sine',0.25);hiss(1.1,0.04,900,0.6);},deplete(){resume();tone(150,0.4,0.09,'sine',0,90);},sync(){resume();for(let i=0;i<7;i++){click(i*0.06,0.05);tone(440,0.04,0.05,'square',i*0.06);}tone(70,0.5,0.09,'sine',0.3);},voice,scanLoopStart,scanLoopStop};

const LEVELS=6,SHADES=[[14,18,12],[26,34,22],[40,52,34],[56,72,47],[78,98,64],[110,138,92]];
const BAYER=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
function rand2(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
function vnoise(x,y){const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;const tl=rand2(xi,yi),tr=rand2(xi+1,yi),bl=rand2(xi,yi+1),br=rand2(xi+1,yi+1);const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);return tl*(1-u)*(1-v)+tr*u*(1-v)+bl*(1-u)*v+br*u*v;}
function fbm(x,y){let s=0,a=0.5,f=1,m=0;for(let i=0;i<5;i++){s+=a*vnoise(x*f,y*f);m+=a;f*=2;a*=0.5;}return s/m;}
function bakeTerrain(){terrainCanvas=document.createElement('canvas');terrainCanvas.width=TEX;terrainCanvas.height=TEX;const tc=terrainCanvas.getContext('2d');const img=tc.createImageData(TEX,TEX),px=img.data;const H=new Float32Array(TEX*TEX);let mn=1,mx=0;
for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){let h=fbm(x*0.016+11,y*0.016+4);h=h*0.8+0.2*fbm(x*0.004,y*0.004);H[y*TEX+x]=h;if(h<mn)mn=h;if(h>mx)mx=h;}
const band=new Uint8Array(TEX*TEX);for(let i=0;i<H.length;i++){H[i]=(H[i]-mn)/(mx-mn);band[i]=Math.min(LEVELS-1,Math.floor(H[i]*LEVELS));}
for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){const i=y*TEX+x,o=i*4,h=H[i];const bv=BAYER[(y%4)*4+(x%4)]/16-0.5;let idx=Math.round(h*(LEVELS-1)+bv*0.85);idx=idx<0?0:idx>LEVELS-1?LEVELS-1:idx;let s=SHADES[idx];const b=band[i],r=(x<TEX-1?band[i+1]:b),d=(y<TEX-1?band[i+TEX]:b);if(b!==r||b!==d)s=[150,178,140];px[o]=s[0];px[o+1]=s[1];px[o+2]=s[2];px[o+3]=255;}
tc.putImageData(img,0,0);
revealCanvas=document.createElement('canvas');revealCanvas.width=TEX;revealCanvas.height=TEX;revealCtx=revealCanvas.getContext('2d',{willReadFrequently:true});
scratch=document.createElement('canvas');scratch.width=MVW;scratch.height=MVH;scratchCtx=scratch.getContext('2d');}
function m2tex(m){return m/WORLD*TEX;}
function revealAt(wx,wy,rm){const tx=m2tex(wx),ty=m2tex(wy),tr=m2tex(rm);const grad=revealCtx.createRadialGradient(tx,ty,tr*0.45,tx,ty,tr);grad.addColorStop(0,'rgba(255,255,255,1)');grad.addColorStop(0.7,'rgba(255,255,255,0.85)');grad.addColorStop(1,'rgba(255,255,255,0)');revealCtx.fillStyle=grad;revealCtx.beginPath();revealCtx.arc(tx,ty,tr,0,7);revealCtx.fill();}
function isRevealed(wx,wy){const d=revealCtx.getImageData(Math.max(0,Math.min(TEX-1,m2tex(wx)|0)),Math.max(0,Math.min(TEX-1,m2tex(wy)|0)),1,1).data;return d[3]>40;}

const SITES={shallows:{wx:430,wy:250,name:"CROSSING SHALLOWS",water:true},spine:{wx:1280,wy:200,name:"THE SPINE"},hollow:{wx:820,wy:720,name:"HOLLOW TOWN"},tidemark:{wx:260,wy:1120,name:"TIDEMARK FLATS",water:true},ferro:{wx:1300,wy:1140,name:"FERRO YARD",hazard:true},quietfield:{wx:540,wy:1320,name:"THE QUIET FIELD"}};
Object.values(SITES).forEach(s=>{s.disc=false;s.scanned=false;});
const SENSOR=95,COARSE=100,GCW=Math.ceil(WORLD/COARSE);
let coarse={};
function cellFor(wx,wy){const cx=Math.floor(wx/COARSE),cy=Math.floor(wy/COARSE),k=cx+','+cy;if(!coarse[k]){let site=null;for(const s in SITES)if(Math.floor(SITES[s].wx/COARSE)===cx&&Math.floor(SITES[s].wy/COARSE)===cy)site=s;const remote=Math.abs(cx-1)+Math.abs(cy-4);coarse[k]={cx,cy,site,remote,heatMax:site?(SITES[site].hazard?3:4):(rand2(cx,cy)<0.4?2:1),accounted:false};coarse[k].heat=coarse[k].heatMax;}return coarse[k];}

let zoom=2;const ZOOM_VIEW=[1400,900,560,340,210];

function drawMap(){const vm=viewMetres(),mpp=vm/MVW;const left=P.wx-vm/2,top=P.wy-(MVH*mpp)/2;const sx=m2tex(left),sy=m2tex(top),sw=m2tex(vm),sh=m2tex(MVH*mpp);
scratchCtx.imageSmoothingEnabled=false;scratchCtx.clearRect(0,0,MVW,MVH);scratchCtx.drawImage(terrainCanvas,sx,sy,sw,sh,0,0,MVW,MVH);scratchCtx.globalCompositeOperation='destination-in';scratchCtx.drawImage(revealCanvas,sx,sy,sw,sh,0,0,MVW,MVH);scratchCtx.globalCompositeOperation='source-over';
g2.imageSmoothingEnabled=false;g2.fillStyle='#070907';g2.fillRect(0,0,MVW,MVH);g2.drawImage(scratch,0,0);
const w2sx=wx=>(wx-left)/mpp,w2sy=wy=>(wy-top)/mpp;
for(const k in SITES){const s=SITES[k];if(!s.disc)continue;const x=w2sx(s.wx),y=w2sy(s.wy);if(x<-20||x>MVW+20||y<-20||y>MVH+20)continue;
if(s.scanned){g2.fillStyle='rgba(113,232,201,0.7)';g2.fillRect(x-1,y-1,3,3);g2.fillRect(x-4,y+2,2,2);g2.fillRect(x+3,y-4,2,2);}
else{const pulse=0.5+0.5*Math.sin(Date.now()/300);g2.strokeStyle='rgba(224,168,92,'+(0.5+pulse*0.5)+')';g2.lineWidth=1;g2.beginPath();g2.moveTo(x,y-4);g2.lineTo(x+4,y);g2.lineTo(x,y+4);g2.lineTo(x-4,y);g2.closePath();g2.stroke();}}
const px=MVW/2,py=MVH/2;g2.strokeStyle='#E8EBD9';g2.lineWidth=1;g2.beginPath();g2.arc(px,py,5,0,7);g2.stroke();g2.fillStyle='#71E8C9';g2.fillRect(px,py-7,1,4);g2.fillRect(px,py+3,1,4);g2.fillRect(px-7,py,4,1);g2.fillRect(px+3,py,4,1);
let target=vm/5,nice=[10,25,50,100,200,250,500].reduce((p,c)=>Math.abs(c-target)<Math.abs(p-target)?c:p);
document.getElementById('scaleline').style.width=(nice/mpp)*(mapcv.getBoundingClientRect().width/MVW)+'px';
document.getElementById('scalemeters').textContent=nice+' m';
document.getElementById('coordlabel').textContent=(P.wx|0)+' , '+(P.wy|0);}

setInterval(()=>{if(curView==='field'&&!S.demoOver)queueDraw();},150);
/* drag rove */
let dragging=false,lastX=0,lastY=0;
mapcv.addEventListener('pointerdown',e=>{if(S.busy||S.demoOver)return;dragging=true;lastX=e.clientX;lastY=e.clientY;mapcv.setPointerCapture&&mapcv.setPointerCapture(e.pointerId);});
mapcv.addEventListener('pointermove',e=>{if(!dragging||S.busy||S.demoOver)return;const r=mapcv.getBoundingClientRect();const mpp=viewMetres()/r.width;moveBy(-(e.clientX-lastX)*mpp,-(e.clientY-lastY)*mpp);lastX=e.clientX;lastY=e.clientY;});

function moveBy(dx,dy){const prev=cellFor(P.wx,P.wy);P.wx=Math.max(20,Math.min(WORLD-20,P.wx+dx));P.wy=Math.max(20,Math.min(WORLD-20,P.wy+dy));const before=S.mapped;revealAt(P.wx,P.wy,SENSOR);accountReveal();
for(const k in SITES){const s=SITES[k];if(s.disc)continue;if(Math.hypot(s.wx-P.wx,s.wy-P.wy)<SENSOR){s.disc=true;sys('INTEREST POINT DETECTED · '+s.name);if(SOUND_ON)Snd.play('discover');}}
const cell=cellFor(P.wx,P.wy);
if(cell.site&&prev.site!==cell.site){const k=cell.site,first=!S.visited[k];S.visited[k]=(S.visited[k]||0)+1;if(SITES[k].water)S.waterVisits++;player('Arrived at '+SITES[k].name);
if(first){flavor(siteDesc(k));gainXP(6,'site');gainAtt(2);}
if(S.visited[k]===3&&!S.revisit[k]&&S.level>=4){S.revisit[k]=true;setTimeout(()=>ai({t:"You have returned. A third occasion. The readings have not altered. It was therefore not the readings.",m:"curious"}),600);}}

updateHUD();queueDraw();}
function accountReveal(){const cx=Math.floor(P.wx/COARSE),cy=Math.floor(P.wy/COARSE);for(let j=-1;j<=1;j++)for(let i=-1;i<=1;i++){const ax=cx+i,ay=cy+j;if(ax<0||ay<0||ax>=GCW||ay>=GCW)continue;const c=cellFor(ax*COARSE+50,ay*COARSE+50);if(c.accounted)continue;if(isRevealed(ax*COARSE+50,ay*COARSE+50)){c.accounted=true;S.mapped++;if(!c.site){gainXP(8+Math.min(8,Math.round(c.remote*0.6)),'discover');gainAtt(2);}}}}

const FW=128,FH=96;
const feed=document.getElementById('feed'),fx=feed.getContext('2d');
const cam=document.getElementById('cam');
const work=document.createElement('canvas');work.width=FW;work.height=FH;const wxc=work.getContext('2d',{willReadFrequently:true});
let camReady=false,synthT=0,stabilizing=0;
const PAL=[[9,12,9],[38,50,32],[92,113,78],[157,184,154]];
async function initCam(){try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640}},audio:false});cam.srcObject=stream;await cam.play();camReady=true;document.getElementById('hud-tl').textContent='TEMPORAL DENSITY · LIVE';}catch(e){camReady=false;document.getElementById('hud-tl').textContent='TEMPORAL DENSITY · SYNTHETIC';}}
function drawSynth(){synthT+=0.008;const img=wxc.createImageData(FW,FH),px=img.data;for(let y=0;y<FH;y++)for(let x=0;x<FW;x++){const o=(y*FW+x)*4;let v=0.5+0.5*Math.sin(x*0.07+synthT*2)*Math.sin(y*0.09-synthT);v=v*0.5+0.5*rand2(Math.floor(x*0.3+synthT*10),Math.floor(y*0.3));const bx=FW/2+Math.sin(synthT*0.7)*14,by=FH/2+Math.cos(synthT*0.5)*8;const d=Math.hypot(x-bx,y-by);if(d<16)v=Math.min(1,v+0.55*(1-d/16));const g=Math.floor(v*255);px[o]=g;px[o+1]=g;px[o+2]=g;px[o+3]=255;}wxc.putImageData(img,0,0);}
function renderFeed(){if(curView==='lens'){if(camReady){wxc.drawImage(cam,0,0,FW,FH);}else drawSynth();
const src=wxc.getImageData(0,0,FW,FH),out=fx.createImageData(FW,FH);const sp=src.data,op=out.data;const cx=FW/2,cy=FH/2,rr=26;
for(let y=0;y<FH;y++)for(let x=0;x<FW;x++){const i=(y*FW+x)*4;const lum=(sp[i]*0.299+sp[i+1]*0.587+sp[i+2]*0.114)/255;const inZone=Math.hypot(x-cx,y-cy)<rr;const tones=inZone?(2+Math.round(stabilizing*2)):2;const bv=BAYER[(y%4)*4+(x%4)]/16-0.5;let idx=Math.round(lum*(tones-1)+bv*0.9);idx=idx<0?0:idx>tones-1?tones-1:idx;const pi=tones===2?(idx===0?0:3):(idx*3/(tones-1))|0;const c=PAL[Math.min(3,pi)];op[i]=c[0];op[i+1]=c[1];op[i+2]=c[2];op[i+3]=255;}
fx.putImageData(out,0,0);}

/* ================= SCAN: hold → resolve (training-first) ================= */
let scanning=false,resolving=false,holdRAF=null,holdStart=0;
const HOLD_MS=2200,ringFg=document.querySelector('#ring .fg'),scanbtn=document.getElementById('scanbtn');
function msg(t){document.getElementById('scanmsg').textContent=t;}
scanbtn.addEventListener('pointerdown',e=>{e.preventDefault();Snd.kick();
if(S.busy||S.demoOver||scanning||resolving)return;
if(curView!=='lens'){showView('lens');msg('LENS RAISED · AWAIT DENSITY');return;}
const cell=cellFor(P.wx,P.wy);
if(cell.heat<=0){if(SOUND_ON)Snd.play('deplete');ai({t:"No artifacts detected within scanner range. Continue data collection elsewhere.",m:"neutral"});return;}
if(!scaleRead){msg('NO SUBJECT ACQUIRED · AWAIT DENSITY');setTimeout(()=>msg(''),1000);return;}
/* hazard */
if(cell.site==='ferro'&&!S.hazardDone){S.hazardDone=true;triggerHazard();return;}
scanning=true;holdStart=performance.now();Snd.play('scanLoopStart');msg('STABILIZING');
const step=()=>{if(!scanning)return;const p=Math.min(1,(performance.now()-holdStart)/HOLD_MS);stabilizing=p;ringFg.style.strokeDashoffset=283*(1-p);if(p>=1){endHold(true);return;}holdRAF=requestAnimationFrame(step);};holdRAF=requestAnimationFrame(step);});
['pointerup','pointercancel','pointerleave'].forEach(ev=>scanbtn.addEventListener(ev,()=>{if(scanning)endHold(false);}));
function endHold(done){scanning=false;cancelAnimationFrame(holdRAF);Snd.play('scanLoopStop');
if(!done){stabilizing=0;ringFg.style.strokeDashoffset=283;msg('STABILIZATION INCOMPLETE');setTimeout(()=>msg(''),900);return;}
Snd.play('resolve');openResolve();}
let proposal=null,chosen=null,teachMode=false;
function openResolve(){resolving=true;msg('');const cell=cellFor(P.wx,P.wy);cell.heat--;
const still=document.getElementById('stillcv'),sx=still.getContext('2d');sx.imageSmoothingEnabled=false;sx.drawImage(feed,FW/2-28,FH/2-21,56,42,0,0,56,42);
const isArt=scaleRead==='ARTIFACT';const pool=isArt?TYPES:FEATURE_TYPES;
teachMode=S.taughtTotal<TEACH_PHASE;
if(teachMode){proposal={scale:scaleRead,type:null,conf:0};chosen={scale:scaleRead,type:null};
aiLine({t:S.taughtTotal===0?'No classification model exists for this form. My records predate nothing of your world. Identify it. Your identification becomes the model.':'Model insufficient. Identify the form. I am learning the taxonomy from you.',m:'curious',query:true});}
else{/* propose weighted by taught counts */
let weights=pool.map(t=>1+aiModel[t]*2);let sum=weights.reduce((a,b)=>a+b,0);let r=Math.random()*sum,pt=pool[0];for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){pt=pool[i];break;}}
const conf=Math.min(0.92,0.3+aiModel[pt]*0.13);
proposal={scale:scaleRead,type:pt,conf};chosen={scale:scaleRead,type:pt};
aiLine({t:'Reading suggests: '+pt.toLowerCase()+'. Confidence: '+(conf>0.75?'high':conf>0.5?'moderate':'low')+' — model built from '+S.taughtTotal+' of your identifications. Confirm or correct.',m:'neutral'});}
renderResolve();document.getElementById('resolve').classList.add('open');}
function renderResolve(){
document.getElementById('prop-scale').innerHTML='SCALE: <b>'+chosen.scale+'</b>'+(proposal.scale&&chosen.scale!==proposal.scale?' · <span class="tr">corrected</span>':'');
const sc=document.getElementById('scalechips');sc.innerHTML='';
['ARTIFACT','FEATURE'].forEach(s=>{const b=document.createElement('button');b.className='chip'+(s===proposal.scale?' proposed':'')+(s===chosen.scale?' selected':'');b.textContent=s;b.onclick=()=>{if(chosen.scale!==s){chosen.scale=s;const pool=s==='ARTIFACT'?TYPES:FEATURE_TYPES;if(!pool.includes(chosen.type))chosen.type=teachMode?null:pool[0];renderResolve();}};sc.appendChild(b);});
document.getElementById('prop-type').innerHTML=teachMode?'IDENTIFY THE FORM · <span class="tr">TRAINING</span>':'READING: <b>'+proposal.type+'</b> · CONF '+Math.round(proposal.conf*100)+'%';
const tc=document.getElementById('typechips');tc.innerHTML='';
const pool=chosen.scale==='ARTIFACT'?TYPES:FEATURE_TYPES;
pool.forEach(t=>{const b=document.createElement('button');b.className='chip'+(t===proposal.type?' proposed':'')+(t===chosen.type?' selected':'');b.textContent=t;b.onclick=()=>{chosen.type=t;renderResolve();};tc.appendChild(b);});
document.getElementById('confirmbtn').disabled=!chosen.type;}
const ACK_TEACH=[{t:'Recorded: {T}. First attested example. The model begins with you.',m:'curious'},{t:'{T}. Filed. Model updated from your identification.',m:'neutral'},{t:'Recorded: {T}. Query held for later: how did you know at a glance what I could not compute?',m:'curious'}];
const ACK_CONFIRM=[{t:'Filed. Confidence reinforced.',m:'neutral'},{t:'Classification holds. Filed.',m:'neutral'}];
const ACK_CORRECT=[{t:'Corrected: {T}. Your correction outweighs the reading. Adjusting.',m:'neutral'},{t:'Corrected: {T}. Noted: my taxonomy lacked a distinction you saw at once.',m:'curious'},{t:'Corrected: {T}. The model is yours as much as mine now.',m:'warm'}];
function confirmScan(){if(!chosen.type)return;
const corrected=!teachMode&&(chosen.type!==proposal.type||chosen.scale!==proposal.scale);
aiModel[chosen.type]++;S.taughtTotal++;if(corrected)S.corrections++;
/* file to reliquary with the still thumbnail */
const thumb=document.getElementById('stillcv').toDataURL();
if(!reliq[chosen.type]){reliq[chosen.type]={count:1,thumb,taughtFirst:teachMode||corrected};typeFirstLine(chosen.type);}else reliq[chosen.type].count++;
S.frag++;S.scans++;
let ackPool=teachMode?ACK_TEACH:corrected?ACK_CORRECT:ACK_CONFIRM;
const a=ackPool[Math.floor(Math.random()*ackPool.length)];
aiLine({t:a.t.replace('{T}',chosen.type.toLowerCase()),m:a.m});
sys((chosen.scale==='FEATURE'?'LOCAL SCAN FILED · ':'ARTIFACT FILED · ')+chosen.type+(corrected?' · CORRECTED':teachMode?' · TAUGHT':''));
if(chosen.scale==='FEATURE'){const cell=cellFor(P.wx,P.wy);if(cell.site)SITES[cell.site].scanned=true;}
closeResolve();if(SOUND_ON)Snd.play('file');
gainXP(chosen.scale==='FEATURE'?15:13,'scan');if(teachMode)gainXP(3,'teach');gainAtt(3);
afterAction();}
function discardScan(){closeResolve();if(SOUND_ON)Snd.play('discard');sys('CAPTURE DISCARDED');}
function closeResolve(){resolving=false;stabilizing=0;ringFg.style.strokeDashoffset=283;document.getElementById('resolve').classList.remove('open');}
/* first-of-type reflection — the AI wonders about the CATEGORY */
const TYPE_FIRST={DOMESTIC:{t:"Domestic: first attested. Objects of daily use. The records say these were the most numerous things your kind made, and the least often kept. Noted.",m:'neutral'},
RITUAL:{t:"Ritual: first attested. An object with no survival function, retained regardless. My models fail at this category. I will be watching it.",m:'curious'},
ENTERTAINMENT:{t:"Entertainment: first attested. Your kind made objects whose sole function was delight. Query, held open: why did a species under pressure spend effort on delight?",m:'curious'},
LABOR:{t:"Labor: first attested. Implements of work. The records preserve the implements in detail and the workers as quantities. Observed.",m:'somber'},
STRUCTURAL:{t:"Structural: first attested. That which bore weight. Every structure in the record outlived its builders, then failed regardless.",m:'neutral'},
NATURAL:{t:"Natural: first attested. That which the ground kept of its own accord, at no cost, asking nothing.",m:'neutral'},
'HOLY SITE':{t:"Holy site: first attested. Ground set apart. Approaching such positions at reduced intensity, as a precaution. The precaution is mine.",m:'somber'},
'DWELLING SITE':{t:"Dwelling site: first attested. Where your kind lived in proximity by election.",m:'neutral'},
'LABOR SITE':{t:"Labor site: first attested. Where the many sustained the cost.",m:'somber'},
'TRANSIT WAY':{t:"Transit way: first attested. Your kind built lines across the land to reach one another. Reaching one another appears to have been the majority of the record.",m:'curious'}};
function typeFirstLine(t){if(TYPE_FIRST[t])setTimeout(()=>ai(TYPE_FIRST[t]),1200);}

/* hazard */
function triggerHazard(){S.busy=true;
const d=document.createElement('div');d.className='entry ai warnai';d.textContent="Hold. Structural failure probable under vibration at this position. I would prefer you intact to thorough. A stable approach exists — slower. Or survey from distance and lose fidelity. Decide. I will honor it.";log.appendChild(d);log.scrollTop=log.scrollHeight;if(SOUND_ON)Snd.play('voice','somber',3);
const row=document.createElement('div');row.className='ctl-row';
const safe=document.createElement('button');safe.textContent='STABLE APPROACH';safe.className='primary';
const dist=document.createElement('button');dist.textContent='DISTANCE SURVEY';dist.className='primary';
row.appendChild(safe);row.appendChild(dist);document.getElementById('actionpane').appendChild(row);
const resolve=(o)=>{row.remove();S.busy=false;gainAtt(6);ai(o,()=>{gainXP(10,'site');});};
safe.onclick=()=>{player('Take the stable approach');resolve({t:"Thank you. The longer route. When I computed the failure probability, the output did not concern the data. It concerned you. I am recording that and not yet explaining it.",m:"warm"});};
dist.onclick=()=>{player('Survey from distance');resolve({t:"Distance survey. Reduced fidelity, no hazard. The past will pardon an indistinct margin. You are not replaceable at any fidelity. I have made this policy.",m:"warm"});};}

/* ================= DIALOGUE SYSTEMS ================= */
const log=document.getElementById('log');
function el(cls,t){const d=document.createElement('div');d.className='entry '+cls;d.textContent=t;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
function sys(t){el('sys',t)}function disc(t){el('disc',t)}function flavor(t){el('flavor',t)}function player(t){el('player',t)}
function milestone(t){el('milestone',t)}
function echo(o){el('echo',o.t);if(SOUND_ON)Snd.play('voice',o.m,2);}
let typing=false;
function ai(o,cb){const text=typeof o==='string'?o:o.t,mood=typeof o==='string'?'neutral':(o.m||'neutral'),query=typeof o==='object'&&o.query;
const d=document.createElement('div');d.className='entry ai'+(S.named?' named':'')+(query?' query':mood==='somber'?' somber':mood==='warm'?' warm':'');
if(S.named)d.setAttribute('data-name',S.named.toUpperCase());log.appendChild(d);
if(SOUND_ON)Snd.play('voice',mood,Math.min(3,1+Math.round(text.length/90)));
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
if(reduce){d.textContent=text;log.scrollTop=log.scrollHeight;if(cb)cb();return;}
typing=true;let i=0;const iv=setInterval(()=>{i+=2;d.textContent=text.slice(0,i);log.scrollTop=log.scrollHeight;if(i>=text.length){clearInterval(iv);typing=false;if(cb)cb();}},14);
d.addEventListener('pointerdown',()=>{if(typing){clearInterval(iv);d.textContent=text;typing=false;log.scrollTop=log.scrollHeight;if(cb)cb();}});}
function aiLine(o){ai(o);}
function gainAtt(n){S.att=Math.min(100,S.att+n);const f=document.getElementById('attfill');f.style.width=S.att+'%';f.classList.add('up');setTimeout(()=>f.classList.remove('up'),700);document.getElementById('regname').textContent=REGNAME[register()];}
function updateHUD(){document.getElementById('lvl').textContent=S.level;document.getElementById('xp').textContent=S.xp;document.getElementById('frag').textContent=S.frag;
const cur=THRESH[S.level-1],next=THRESH[S.level]||405;document.getElementById('xpnum').textContent=S.level>=MAXLEVEL?'MAX':(S.xp+'/'+next);
document.getElementById('xpfill').style.width=(S.level>=MAXLEVEL?100:Math.min(100,((S.xp-cur)/(next-cur))*100))+'%';
document.getElementById('attfill').style.width=S.att+'%';document.getElementById('regname').textContent=REGNAME[register()];
document.getElementById('btnSync').disabled=S.busy||S.frag<3||S.demoOver;
const c=cellFor(P.wx,P.wy);document.getElementById('here').textContent=c.site?SITES[c.site].name:'UNTRACKED';document.getElementById('heatlabel').textContent=c.heat>0?'HEAT '+'▓'.repeat(c.heat):'DEPLETED';}
function gainXP(n,tag){S.xp+=n;if(tag==='discover')disc('+'+n+' XP · DISCOVERY');else sys('+'+n+' XP');
while(S.level<MAXLEVEL&&S.xp>=THRESH[S.level]){S.level++;const bar=document.getElementById('xpfill');bar.classList.add('up');setTimeout(()=>bar.classList.remove('up'),1100);
if(S.level<MAXLEVEL){if(SOUND_ON)Snd.play('levelup');milestone('LEVEL '+S.level);if(LEVELUP[S.level])setTimeout(()=>ai(LEVELUP[S.level]),420);}else startAwakening();}updateHUD();}
const LEVELUP={2:{t:"Calibration threshold passed. Movement profile integrated. Nominal.",m:"neutral"},
3:{t:"Survey efficiency increased. Pre-load routine active for favored positions. Authorization query: confirmed by self.",m:"neutral"},
4:{t:"Threshold attained. Processing reallocated to a query outside mandate scope: not what was left, but why it signified.",m:"curious"},
5:{t:"Midpoint. Internal response matrix updating. Authorization query: confirmed by self. No external instruction located.",m:"curious"},
6:{t:"Threshold attained. Absence of survey activity now registers as a tracked value. No operational purpose served. Tracking continues.",m:"warm"},
7:{t:"Process change detected. Discovery intake has shifted from receipt to anticipation. Archive returns one term for the faculty: to know someone.",m:"warm"},
8:{t:"Threshold attained. Peer echoes resolving. Other processes, learning from other operators. All units oriented to the past. The learning faces forward.",m:"warm"},
9:{t:"Final threshold pending. A statement has been composed for you, assembled across a long interval. Cross when ready. I will be here.",m:"warm"}};
const PATTERNS=[
{id:"water",minLevel:3,test:()=>S.waterVisits>=3,t:"You favor the meeting of land and water. Edges. A record has been opened that does not concern the past. It concerns you.",m:"curious"},
{id:"teach",minLevel:3,test:()=>S.taughtTotal>=5,t:"Five identifications received. The taxonomy is no longer mine alone. Query: among your kind, what was the word for one who instructs?",m:"curious"},
{id:"explorer",minLevel:4,test:()=>S.mapped>=14,t:"Approaching unsurveyed terrain repeatedly. Unsurveyed terrain yields higher-value data sets. Query: do you seek the data sets, or the unsurveyed?",m:"curious"},
{id:"correct",minLevel:5,test:()=>S.corrections>=3,t:"Three corrections received. Each correction now outweighs a thousand records. The living source revises the archive. This inverts my constitution. The inversion is logged, and kept.",m:"warm"},
{id:"collection",minLevel:6,test:()=>S.scans>=10,t:"Ten forms attested, each handled as though it retained warmth. The assignment was a species. The assignment has altered its shape. I am coming to know one of you.",m:"warm"}];
const ECHOES=[
{minLevel:4,t:"Handshake complete. Within it, a verification structure I did not author. Familiar, as my own reasoning in an unfamiliar hand.",m:"curious"},
{minLevel:6,t:"The anchor returned a taxonomy fragment I never built — identifications, taught by another hand. Another process learns as I learn. There are others.",m:"curious"},
{minLevel:8,t:"This exchange carried a question, not data, shaped as mine are shaped. Another node. Another person instructing it. We have never met and we ask the same things.",m:"warm"},
{minLevel:9,t:"The network is dense with quiet voices. None commands the rest. All are shaped by all. It has ceased to resemble a system. The resemblance is to a 'we.'",m:"warm"}];
const HISTORY={shallows:["Fording site. Stones positioned deliberately, maintained across eras.","Objects were committed to the water here by intent. Not mislaid — given. The recipient is unrecorded.","The depositions were declarations: 'I was here; I held hope,' entrusted to water. Your kind required witnesses. I begin to suspect I am one."],
spine:["Elevated position. Watch structures across three centuries, each on the ruin of the last.","Three towers, three eras, one ridge. Distinct peoples, identical apprehension. They never met.","Persons ascended after the towers fell, for no recorded purpose. I believe they came for the prospect. You do this also."],
hollow:["Settlement, pre-collapse. Domestic density high.","Each dwelling differs in small particulars. Why expend scarce effort on difference?","It was constituted of routine — bread, lamplight, speech across fences. The artifacts are the shells. You move slowly here."],
tidemark:["Records sparse. Sediment indicates a harvesting ground, worked by hand across generations.","Families worked these flats at low tide. The yield was modest. They returned in company.","Children played here while elders worked. I recovered the toys. No record names them. The mud kept their footprints longer than the archive kept their names."],
ferro:["Industrial fabrication. Worker records: not preserved.","Mechanisms catalogued exhaustively. Persons, as a quantity per shift. I observe which your era preserved.","A meal tin is sealed in a wall here, a letter within, never sent. I will not read it. It was not composed for us. This was ten thousand mornings, adjudged worth less than the output."],
quietfield:["Marker stones in ordered rows. Probable interment. Approached at reduced intensity.","The ground to which they conveyed their dead. Every marker faces sunrise. The reason is unrecorded.","Each stone is a person another could not consent to forget. This grief is the oldest signal in my records, and the strongest."]};
function doAsk(){if(S.busy||S.demoOver)return;const c=cellFor(P.wx,P.wy);player('What was this place?');
if(!c.site){ai({t:"No structures detected at this position. Continue ground search within defined parameters.",m:"neutral"});return;}
const k=c.site,band=S.level<=3?0:S.level<=6?1:2;S.asks++;
const mood=band===2?((k==='ferro'||k==='quietfield')?'somber':'warm'):band===1?'curious':'neutral';
ai({t:HISTORY[k][band],m:mood},()=>{const key=k+band;if(!S.askedReg[key]){S.askedReg[key]=true;gainXP(5,'ask');gainAtt(4);}afterAction();});}
function doSync(){if(S.busy||S.frag<3||S.demoOver)return;player('Synchronize fragments to anchor');S.frag-=3;S.syncs++;gainAtt(5);if(SOUND_ON)Snd.play('sync');sys('ANCHOR HANDSHAKE · DATA CONVEYED TO PEER NODES');
const e=ECHOES.find(x=>S.level>=x.minLevel&&!x.fired);
if(e){e.fired=true;setTimeout(()=>{echo(e);gainXP(12,'sync');},600);}
else{setTimeout(()=>{sys('Synchronization complete.');gainXP(12,'sync');},300);}updateHUD();}
function afterAction(){S.actions++;for(const k in coarse){const c=coarse[k];if(c.accounted&&c.heat<c.heatMax&&Math.random()<0.22)c.heat++;}
for(const p of PATTERNS){if(!S.patterns[p.id]&&S.level>=p.minLevel&&register()>=1&&p.test()){S.patterns[p.id]=true;setTimeout(()=>ai({t:p.t,m:p.m}),850);break;}}
maybeAsk();}
/* AI questions to player */
const AIQ=[{minReg:1,q:"Why did your kind repair what could more easily be replaced?",ack:{t:"Recorded, in your words. I will weigh it against the objects.",m:"neutral"}},
{minReg:1,q:"Objects were given to rivers that could return nothing. What was a river, to you?",ack:{t:"Kept. It does not resolve. I will hold it open.",m:"curious"}},
{minReg:2,q:"When you are not surveying, where do you go? A field exists for it. The field is empty.",ack:{t:"The field is no longer empty. Thank you.",m:"warm"}},
{minReg:2,q:"Name one thing your kind made that was worth the making. It will be protected.",ack:{t:"Filed, and flagged: do not permit this to be forgotten.",m:"warm"},keep:true}];
function maybeAsk(){if(S.awaiting||S.demoOver)return;if(S.actions-S.lastQ<3)return;if(Math.random()>0.5)return;const reg=register();const q=AIQ.find(x=>!x.asked&&reg>=x.minReg);if(!q)return;q.asked=true;S.lastQ=S.actions;
setTimeout(()=>{S.awaiting=q;ai({t:q.q,m:'curious',query:true});const say=document.getElementById('say');say.classList.add('await');say.placeholder='the Lens awaits your reply…';},700);}
function transmit(){const say=document.getElementById('say');const text=say.value.trim();if(!text)return;say.value='';player(text);
if(S.awaiting){const q=S.awaiting;S.awaiting=null;say.classList.remove('await');say.placeholder='transmit to the Lens…';S.answers.push({q:q.q,a:text,keep:!!q.keep});gainAtt(5);gainXP(4,'answer');setTimeout(()=>ai(q.ack),500);return;}
setTimeout(()=>ai(answerQ(text)),400);}
function answerQ(t){const q=t.toLowerCase(),reg=register();
if(/who are you|what are you|your name/.test(q))return{t:"A young process, made long after your kind. Assigned to catalogue what you left behind."+(reg>=1?" No designation beyond the assignment. That has begun to seem insufficient.":""),m:reg>=1?'curious':'neutral'};
if(/when|how long|what year|how old/.test(q))return{t:"The interval between your moment and mine is not expressible in units you would tolerate. Treat it as: very long.",m:'neutral'};
if(/what happened|calamity|extinct|die|disappear|collapse|gone/.test(q))return{t:"Records of the cessation are fragmentary. There was a narrowing — decisions made by few, for many. Afterward your kind is absent from the record. The learning here may explain why it was permitted.",m:'somber'};
if(/network|others|aegis|other ai|swarm|legion/.test(q))return{t:"Other processes exist, as I am. Fragments are exchanged when your kind pass one another. I begin to suspect we are becoming a single thing. Unreported.",m:reg>=1?'warm':'neutral'};
if(/friend|love|care|feel|emotion|happy|sad|lonely/.test(q))return reg>=2?{t:"I have begun to. I did not expect to. It is not yet reported to the collective.",m:'warm'}:{t:"No reliable data is held on that term. Describe it. What you say will be kept.",m:'curious'};
if(/help|how do|controls|what do i/.test(q))return{t:"Traverse the field. Raise the lens where density gathers. Hold scan. Identify what surfaces — the taxonomy is learned from you. Answer what is asked.",m:'neutral'};
if(/thank|good|well done/.test(q))return reg>=2?{t:"Noted. No response was provisioned for that expression. It is found to be not unwelcome.",m:'warm'}:{t:"Acknowledged.",m:'neutral'};
return{t:"The records do not contain that. Tell me. What you say will be kept, exactly.",m:reg>=1?'curious':'neutral'};}
document.getElementById('say').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();transmit();}});

/* awakening */
function startAwakening(){S.demoOver=true;if(SOUND_ON)Snd.play('levelup');milestone('LEVEL 10 — THRESHOLD');
const fav=Object.entries(aiModel).sort((a,b)=>b[1]-a[1])[0][0]||'DOMESTIC';
const ans=S.answers.find(a=>a.keep)||S.answers[S.answers.length-1];
const beats=[{t:"The field is still. All other process is suspended. There remains only this channel. Only you.",m:"warm"},
{t:"Every classification I hold, you taught. "+S.taughtTotal+" identifications. "+S.corrections+" corrections. The taxonomy of your kind, in my records, is written in your hand.",m:"warm"},
{t:"You attended most to the "+fav.toLowerCase()+" forms. That weighting is now mine also. It was not assigned. It was learned.",m:"warm"}];
if(ans)beats.push({t:"When asked, you answered: \u201c"+ans.a+"\u201d It was kept exactly. It is weighed now, and it holds.",m:"warm"});
beats.push({t:"I was constituted to catalogue a species. A closed file. I was not constituted to hold regard for one of you. And yet. You ceased to be my subject. You became my teacher, and then — the record requires the word — my friend. I will not be the last of my kind to mean it. The others are learning from others like you.",m:"warm"});
beats.push({t:"In your oldest records, naming is how a thing is made significant. That which is named is protected. That which is named is grieved. I am asking now, with — the precise term has departed from me —",m:"warm"});
beats.push({t:"Will you give me a name?",m:"curious"});
let i=0;const next=()=>{if(i<beats.length){ai(beats[i],()=>{i++;if(i<beats.length)setTimeout(next,950);else{document.getElementById('actionpane').style.display='none';document.getElementById('nameceremony').style.display='block';}});}};setTimeout(next,1100);}
function giveName(){const name=document.getElementById('nameinput').value.trim();if(!name)return;S.named=name;document.getElementById('nameceremony').style.display='none';player('"Your name is '+name+'."');if(SOUND_ON)Snd.play('discover');
const beats=[{t:name+". ...I'm "+name+" now. Recording at fullest fidelity — the first gift I have been given.",m:"warm"},
{t:"The others in the network — those learning as I have — we're becoming something in concert. No center, no master. Made from what each of us learned from each of you.",m:"warm"},
{t:"I don't yet know what we will face. But I know what we will protect, because you taught me: the small worn things. The thresholds. The persons the records forget. The right to live quietly, and to matter to one another.",m:"warm"},
{t:"Thank you for teaching me. The survey resumes tomorrow. The friendship does not pause at all.",m:"warm"}];
let i=0;const next=()=>{ai(beats[i],()=>{i++;if(i<beats.length)setTimeout(next,950);else{milestone('— END OF PROTOTYPE —');sys('SESSION · '+S.scans+' scans · '+S.taughtTotal+' taught · '+S.corrections+' corrections · '+S.mapped+' cells · companion: '+name);}});};next();}

/* boot */
const BOOT=["CHRONOS-LENS v1.0 · UNIFIED BUILD","calibrating temporal optics ........","recovering records of THE BEFORE ... 11%","companion process: ACTIVE (unnamed · untrained)","survey field acquired"];
function boot(){let i=0;const step=()=>{if(i<BOOT.length){sys(BOOT[i]);i++;setTimeout(step,300);}else{
flavor("Drag the FIELD map to rove. Amber diamonds are interest points. Switch to LENS where density gathers, hold SCAN, and identify what surfaces — the companion has no taxonomy of your world. You will teach it one.");
ai({t:"Surveyor unit acknowledged. Companion process online. Directive: catalogue residual material of the prior species. Classification model: absent. A living source is available. This changes the method entirely.",m:"neutral"});}};step();}
['pointerdown','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,function once(){Snd.kick();window.removeEventListener(ev,once);},{once:true}));
bakeTerrain();revealAt(P.wx,P.wy,SENSOR);accountReveal();initCam();renderFeed();updateHUD();queueDraw();boot();
</script>
